<!DOCTYPE html>
<html>

<head>
     <title>GitHub User Dossier</title>
     <link rel="stylesheet" href="main.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

     <div class="title-search">
          <h1>GitHub User Dossier</h1>
          <form class="search-container" id="searchForm">
               <input id="username" type="text" placeholder="GitHub Username..." />

               <button type="submit" class="search-btn" aria-label="Search">
                    <i class="fa fa-search"></i>
               </button>
          </form>
     </div>
     <div id="user"></div>

     <div class="collapsible-section open">
          <button class="section-toggle">
               <span>Charts</span>
               <i class="fa fa-chevron-down"></i>
          </button>

          <div class="section-content">
               <div class="charts">

               </div>

          </div>
     </div>

     <div class="collapsible-section open">
          <button class="section-toggle">
               <span>Repositories </span>
               <i class="fa fa-chevron-down"></i>
          </button>

          <div class="section-content">
               <div class="repositories">
                    <div class="sorters">
                         <div class="dropdown ddGroup">
                              <button class="dropdown-btn" id="dropdownBtnGroup">
                                   <span>Groups</span>
                                   <i class="fa fa-angle-down"></i>
                              </button>

                              <div class="dropdown-menu" id="dropdownMenuGroup">
                                   <div class="dropdown-item ddig">Groups</div>
                                   <div class="dropdown-item ddig">Main Language</div>
                                   <div class="dropdown-item ddig">All</div>
                              </div>
                         </div>

                         <div class="dropdown ddOrder">
                              <button class="dropdown-btn" id="dropdownBtnOrder">
                                   <span>Stars</span>
                                   <i class="fa fa-angle-down"></i>
                              </button>

                              <div class="dropdown-menu" id="dropdownMenuOrder">
                                   <div class="dropdown-item ddio">Stars</div>
                                   <div class="dropdown-item ddio">Name</div>
                                   <div class="dropdown-item ddio">Last Updated</div>
                              </div>
                         </div>
                    </div>
               </div>
               <div id="repos"></div>
          </div>
     </div>
     <div class="collapsible-section open">
          <button class="section-toggle">
               <span>Contribution Overview</span>
               <i class="fa fa-chevron-down"></i>
          </button>
          <div class="section-content">
               <div id="contributionsContent"></div>
          </div>
     </div>
     <div class="collapsible-section open">
          <button class="section-toggle">
               <span>Recent Activity</span>
               <i class="fa fa-chevron-down"></i>
          </button>
          <div class="section-content">
               <div id="activityContent"></div>
          </div>
     </div>
     <script type="module" src="javascript/app.js"></script>
</body>

</html>
